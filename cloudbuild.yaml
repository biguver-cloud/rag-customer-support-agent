steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker build --build-arg "OPENAI_API_KEY=$$OPENAI_API_KEY" -t gcr.io/$PROJECT_ID/rag-support-agent .'
    secretEnv: ['OPENAI_API_KEY']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/rag-support-agent']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - rag-support-agent
      - --image=gcr.io/$PROJECT_ID/rag-support-agent
      - --platform=managed
      - --region=asia-northeast1
      - --allow-unauthenticated
      - --set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest

images:
  - gcr.io/$PROJECT_ID/rag-support-agent

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/OPENAI_API_KEY/versions/latest
      env: 'OPENAI_API_KEY'

options:
  logging: CLOUD_LOGGING_ONLY
